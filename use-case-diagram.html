<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Sơ đồ Use Case - Hệ thống Đặt Tour & Chatbot AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 40px;
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      background: #ffffff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      border: 1px solid #e2e8f0;
      display: inline-block;
    }
    h2 {
      text-align: center;
      color: #0f172a;
      margin-bottom: 20px;
      font-weight: 700;
      font-size: 22px;
    }
    p.subtitle {
      text-align: center;
      color: #64748b;
      margin-top: -15px;
      margin-bottom: 30px;
      font-size: 14px;
    }
    svg {
      display: block;
    }
    /* Typography style inside SVG */
    text {
      font-family: 'Inter', sans-serif;
    }
    .actor-name {
      font-weight: 700;
      font-size: 12px;
      fill: #1e293b;
    }
    .usecase-text {
      font-size: 11px;
      fill: #1e293b;
      font-weight: 500;
    }
    .system-title {
      font-weight: 700;
      font-size: 16px;
      fill: #475569;
    }
    /* Hover effects for modern look */
    ellipse {
      transition: all 0.3s ease;
    }
    ellipse:hover {
      fill: #f0fdfa !important;
      stroke: #0d9488 !important;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.05));
    }
    .actor-g:hover circle, .actor-g:hover path {
      stroke: #2563eb !important;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Sơ đồ Use Case Tổng Thể Hệ Thống Đặt Tour Du Lịch & Chatbot AI</h2>
  <p class="subtitle">Thiết kế chuẩn hóa: Quản lý kế thừa Nhân viên, Nhân viên kế thừa Khách hàng, Tích hợp Chatbot AI</p>
  
  <svg width="1000" height="780" viewBox="0 0 1000 780" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Filters & Markers -->
    <defs>
      <!-- Background pattern -->
      <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
        <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#f1f5f9" stroke-width="1"/>
      </pattern>
      <!-- Shadow -->
      <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
        <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.04"/>
      </filter>
      <!-- Generalization hollow triangle marker -->
      <marker id="generalization" viewBox="0 0 12 12" refX="12" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
        <path d="M 0 0 L 12 6 L 0 12 Z" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
      </marker>
    </defs>

    <rect width="1000" height="780" fill="url(#grid)" rx="12" />

    <!-- SYSTEM BOUNDARY -->
    <rect x="250" y="30" width="710" height="720" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
    <text x="605" y="60" text-anchor="middle" class="system-title">HỆ THỐNG QUẢN LÝ VÀ ĐẶT TOUR DU LỊCH & CHATBOT AI</text>

    <!-- ================= ACTORS (LEFT SIDE) ================= -->

    <!-- Actor 1: Quản lý (Top Left) -->
    <g class="actor-g" transform="translate(80, 100)">
      <circle cx="40" cy="20" r="12" fill="#ffffff" stroke="#475569" stroke-width="2"/>
      <path d="M 40 32 L 40 65 M 40 40 L 22 52 M 40 40 L 58 52 M 40 65 L 22 85 M 40 65 L 58 85" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
      <text x="40" y="105" text-anchor="middle" class="actor-name">Quản lý</text>
    </g>

    <!-- Actor 2: Nhân viên (Middle Left) -->
    <g class="actor-g" transform="translate(80, 320)">
      <circle cx="40" cy="20" r="12" fill="#ffffff" stroke="#475569" stroke-width="2"/>
      <path d="M 40 32 L 40 65 M 40 40 L 22 52 M 40 40 L 58 52 M 40 65 L 22 85 M 40 65 L 58 85" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
      <text x="40" y="105" text-anchor="middle" class="actor-name">Nhân viên</text>
    </g>

    <!-- Actor 3: Khách hàng (Bottom Left) -->
    <g class="actor-g" transform="translate(80, 560)">
      <circle cx="40" cy="20" r="12" fill="#ffffff" stroke="#475569" stroke-width="2"/>
      <path d="M 40 32 L 40 65 M 40 40 L 22 52 M 40 40 L 58 52 M 40 65 L 22 85 M 40 65 L 58 85" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
      <text x="40" y="105" text-anchor="middle" class="actor-name">Khách hàng</text>
    </g>

    <!-- ================= GENERALIZATION RELATIONSHIPS ================= -->
    <!-- Quản lý -> Nhân viên (Quản lý kế thừa Nhân viên) -->
    <path d="M 120 220 L 120 305" stroke="#475569" stroke-width="2" marker-end="url(#generalization)"/>

    <!-- Nhân viên -> Khách hàng (Nhân viên kế thừa Khách hàng) -->
    <path d="M 120 440 L 120 545" stroke="#475569" stroke-width="2" marker-end="url(#generalization)"/>


    <!-- ================= USE CASES (INSIDE BOUNDARY) ================= -->

    <!-- --- PHÂN HỆ QUẢN LÝ (Top) --- -->
    <g transform="translate(290, 90)">
      <ellipse cx="140" cy="25" rx="110" ry="22" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
      <text x="140" y="29" text-anchor="middle" class="usecase-text">Quản lý tài khoản & phân quyền</text>
    </g>
    <g transform="translate(560, 90)">
      <ellipse cx="140" cy="25" rx="110" ry="22" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
      <text x="140" y="29" text-anchor="middle" class="usecase-text">Xem dashboard & thống kê doanh thu</text>
    </g>
    <line x1="390" y1="112" x2="150" y2="150" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="560" y1="112" x2="150" y2="150" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="2 2"/>

    <!-- --- PHÂN HỆ NHÂN VIÊN (Middle) --- -->
    <g transform="translate(290, 210)">
      <ellipse cx="110" cy="24" rx="95" ry="20" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
      <text x="110" y="28" text-anchor="middle" class="usecase-text">Quản lý Tour & Danh mục</text>
    </g>
    <g transform="translate(520, 210)">
      <ellipse cx="110" cy="24" rx="95" ry="20" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
      <text x="110" y="28" text-anchor="middle" class="usecase-text">Quản lý đơn đặt tour (Booking)</text>
    </g>
    <g transform="translate(290, 275)">
      <ellipse cx="110" cy="24" rx="95" ry="20" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
      <text x="110" y="28" text-anchor="middle" class="usecase-text">Quản lý bài viết cẩm nang</text>
    </g>
    <g transform="translate(520, 275)">
      <ellipse cx="110" cy="24" rx="95" ry="20" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
      <text x="110" y="28" text-anchor="middle" class="usecase-text">Chat hỗ trợ trực tuyến khách hàng</text>
    </g>
    <!-- Links from Nhân viên to Employee Use Cases -->
    <line x1="290" y1="230" x2="150" y2="370" stroke="#22c55e" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="520" y1="230" x2="150" y2="370" stroke="#22c55e" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="290" y1="295" x2="150" y2="370" stroke="#22c55e" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="520" y1="295" x2="150" y2="370" stroke="#22c55e" stroke-width="1" stroke-dasharray="2 2"/>


    <!-- --- PHÂN HỆ KHÁCH HÀNG (Bottom & Chatbot AI) --- -->
    <!-- Cột 1 -->
    <g transform="translate(280, 400)">
      <ellipse cx="115" cy="22" rx="100" ry="18" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1.5"/>
      <text x="115" y="26" text-anchor="middle" class="usecase-text">Đăng ký & Đăng nhập tài khoản</text>
    </g>
    <g transform="translate(280, 460)">
      <ellipse cx="115" cy="22" rx="100" ry="18" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1.5"/>
      <text x="115" y="26" text-anchor="middle" class="usecase-text">Tìm kiếm & xem chi tiết tour</text>
    </g>
    <g transform="translate(280, 520)">
      <ellipse cx="115" cy="22" rx="100" ry="18" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1.5"/>
      <text x="115" y="26" text-anchor="middle" class="usecase-text">Đọc bài viết cẩm nang du lịch</text>
    </g>
    <g transform="translate(280, 580)">
      <ellipse cx="115" cy="22" rx="100" ry="18" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1.5"/>
      <text x="115" y="26" text-anchor="middle" class="usecase-text">Thêm tour vào giỏ hàng (đặt chỗ)</text>
    </g>
    <g transform="translate(280, 640)">
      <ellipse cx="115" cy="22" rx="100" ry="18" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1.5"/>
      <text x="115" y="26" text-anchor="middle" class="usecase-text">Đặt đơn & Thanh toán qua PayOS</text>
    </g>
    <g transform="translate(280, 700)">
      <ellipse cx="115" cy="22" rx="100" ry="18" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1.5"/>
      <text x="115" y="26" text-anchor="middle" class="usecase-text">Xem lịch sử & Hủy đơn đặt tour</text>
    </g>

    <!-- Cột 2: Chatbot AI chuyên sâu -->
    <g transform="translate(560, 440)">
      <ellipse cx="150" cy="25" rx="130" ry="22" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
      <text x="150" y="29" text-anchor="middle" class="usecase-text" style="fill: #1d4ed8; font-weight: bold;">Hỏi đáp & Tư vấn tự động (Chatbot AI)</text>
    </g>
    <g transform="translate(560, 520)">
      <ellipse cx="150" cy="25" rx="130" ry="22" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
      <text x="150" y="29" text-anchor="middle" class="usecase-text" style="fill: #1d4ed8; font-weight: bold;">Đặt tour trực tiếp trong chat (Chat-to-Action)</text>
    </g>
    <g transform="translate(560, 600)">
      <ellipse cx="150" cy="25" rx="130" ry="22" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
      <text x="150" y="29" text-anchor="middle" class="usecase-text" style="fill: #1d4ed8; font-weight: bold;">Gặp nhân viên hỗ trợ (Live Chat Handoff)</text>
    </g>

    <!-- Links from Khách hàng to Customer Use Cases -->
    <line x1="280" y1="418" x2="150" y2="610" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="280" y1="478" x2="150" y2="610" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="280" y1="538" x2="150" y2="610" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="280" y1="598" x2="150" y2="610" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="280" y1="658" x2="150" y2="610" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="280" y1="718" x2="150" y2="610" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="2 2"/>

    <!-- Links to AI Chatbot specialized cases -->
    <line x1="560" y1="462" x2="150" y2="610" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="560" y1="542" x2="150" y2="610" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="560" y1="622" x2="150" y2="610" stroke="#2563eb" stroke-width="1.5"/>

    <!-- Include Live Chat Handoff link to Employee support chat -->
    <path d="M 710 598 L 710 297" stroke="#2563eb" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="715" y="430" fill="#2563eb" font-size="10" font-weight="600" orient="vertical">&lt;&lt;extend&gt;&gt;</text>

  </svg>
</div>

</body>
</html>
